<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f97316">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkJPTUlTIEF0dGVuZGFuY2UiLAogICJzaG9ydF9uYW1lIjogIkJPTUlTIEFwcCIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjk3MzE2IiwKICAidGhlbWVfY29sb3IiOiAiI2Y5NzMxNiIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImljb24ucG5nIiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciLAogICAgICAicHVycG9zZSI6ICJhbnkgbWFza2FibGUiCiAgICB9CiAgXQp9">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; padding-top: env(safe-area-inset-top); }
        .school-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        /* Forces the icon to fill the header circle completely */
        .icon-fill { object-fit: cover; transform: scale(1.1); }
    </style>
</head>
<body class="bg-orange-50 min-h-screen text-slate-900 flex flex-col">

    <header class="school-gradient text-white px-5 pt-6 pb-12 rounded-b-[2.5rem] shadow-lg sticky top-0 z-20">
        <div class="max-w-md mx-auto">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="bg-white w-14 h-14 rounded-full shadow-md overflow-hidden flex items-center justify-center border-none">
                        <img src="icon.png" alt="BOMIS" class="icon-fill w-full h-full" onerror="this.src='https://img.icons8.com/fluency/96/checked-user-male.png'">
                    </div>
                    <div>
                        <h1 class="text-lg font-black tracking-tight leading-none uppercase">BOMIS PURNEA</h1>
                        <p class="text-[9px] font-bold text-orange-100 tracking-widest uppercase opacity-90">Attendance AI Dashboard</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-black/20 p-2 rounded-xl text-[9px] font-black uppercase">Reset</button>
            </div>
            
            <div id="statsHeader" class="grid grid-cols-3 gap-2 opacity-0 transition-opacity duration-500">
                <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md border border-white/10 text-center">
                    <p class="text-[8px] uppercase font-bold text-orange-50 mb-1">Percentage</p>
                    <p id="h_perc" class="text-lg font-black">0%</p>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md border border-white/10 text-center">
                    <p class="text-[8px] uppercase font-bold text-orange-50 mb-1">Total Days</p>
                    <p id="h_days" class="text-lg font-black">0</p>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md border border-white/10 text-center">
                    <p class="text-[8px] uppercase font-bold text-orange-50 mb-1">Avg/Day</p>
                    <p id="h_avg" class="text-lg font-black">0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-md w-full mx-auto px-4 -mt-6 relative z-10 space-y-4 mb-28">
        
        <div class="bg-white rounded-3xl p-5 shadow-xl border border-orange-100">
            <div id="dropZone" class="relative border-2 border-dashed border-orange-200 rounded-2xl p-6 text-center bg-orange-50/30 transition-all flex flex-col items-center justify-center min-h-[180px]">
                
                <input type="file" id="imageInput" accept="image/*" onchange="handleSelection(this)" class="absolute inset-0 w-full h-full opacity-0 z-30 cursor-pointer">
                
                <div id="promptContent" class="space-y-3 pointer-events-none">
                    <div class="w-14 h-14 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto shadow-sm">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <div>
                        <p class="text-orange-700 font-bold">Snap or Upload Photo</p>
                        <p class="text-orange-400 text-xs">Register pages or screenshots</p>
                    </div>
                </div>

                <div id="successContent" class="hidden flex flex-col items-center z-20 space-y-3 animate-in fade-in zoom-in duration-300">
                    <div class="relative">
                        <img id="previewImg" class="w-24 h-24 object-cover rounded-2xl border-4 border-white shadow-lg">
                        <div class="absolute -top-2 -right-2 bg-green-500 text-white rounded-full p-1 shadow-md">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                    <p class="text-green-600 font-black text-[10px] uppercase tracking-widest">Selected Image Ready</p>
                </div>
            </div>
            
            <button onclick="analyze()" id="mainBtn" class="w-full mt-4 bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-sm uppercase tracking-widest disabled:opacity-50">
                Run AI Analysis
            </button>
        </div>

        <div id="loading" class="hidden py-8 text-center">
            <div class="inline-block w-8 h-8 border-4 border-orange-600 border-t-transparent rounded-full animate-spin mb-3"></div>
            <p class="text-orange-600 font-bold text-xs animate-pulse uppercase tracking-widest">BOMIS AI is reading register...</p>
        </div>

        <div id="results" class="hidden bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-100">
            <div class="px-5 py-4 bg-orange-50/50 flex justify-between items-center border-b border-orange-100">
                <span class="text-[10px] font-black uppercase text-orange-600 tracking-widest">Attendance Report</span>
                <button onclick="download()" class="text-orange-700 text-[10px] font-black underline underline-offset-4">Download CSV</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-orange-50 text-[10px] font-bold text-orange-400 uppercase">
                        <tr><th class="px-6 py-3">Student Name</th><th class="px-4 py-3 text-center">P</th><th class="px-4 py-3 text-center">A</th></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-orange-50 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="fixBar" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-xs bg-slate-900/95 backdrop-blur-xl text-white rounded-[2rem] p-3 shadow-2xl flex justify-between items-center z-50 safe-bottom">
        <div class="ml-4">
            <p class="text-[9px] font-bold text-slate-400 uppercase">Working Days</p>
            <p class="text-sm font-black"><span id="daysCount">0</span> Days</p>
        </div>
        <button onclick="changeDays()" class="bg-orange-600 px-6 py-3 rounded-full text-[10px] font-black uppercase">Edit Days</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // Gemini Flash 3 Config
        const API_KEY = "AIzaSyCqS9flyeUi8Lcvn_nEbH0jDCNe3oIxB0w";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.handleSelection = (input) => {
            const file = input.files[0];
            if(file) {
                document.getElementById('promptContent').classList.add('hidden');
                document.getElementById('successContent').classList.remove('hidden');
                document.getElementById('dropZone').classList.replace('border-orange-200', 'border-green-400');
                
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('previewImg').src = e.target.result; };
                reader.readAsDataURL(file);
            }
        };

        window.analyze = async () => {
            const input = document.getElementById('imageInput');
            if(!input.files[0]) return alert("Please select or take a photo first!");
            toggleUI(true);

            try {
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" }, { apiVersion: "v1" });
                const base64 = await toBase64(input.files[0]);

                const prompt = "Read this school attendance sheet from Birla Open Minds. Count student names and their total present marks '|' and absent 'Ab'. Return JSON ONLY: [{'n':'NAME','p':10,'a':2}]. Ensure consistency in column totals.";

                const result = await model.generateContent([prompt, base64]);
                const data = JSON.parse(result.response.text().replace(/```json|```/g, ""));
                
                window.rawScan = data;
                updateStats(data);
                render(data);
                if (navigator.vibrate) navigator.vibrate(50);
            } catch (e) {
                alert("AI Reading Error: " + e.message);
            } finally {
                toggleUI(false);
            }
        };

        function updateStats(data, manualDays = null) {
            let totalP = 0, maxD = 0;
            data.forEach(s => { totalP += s.p; maxD = Math.max(maxD, (s.p + s.a)); });
            const days = manualDays || maxD;
            const perc = ((totalP / (data.length * days)) * 100).toFixed(1);
            const avg = (totalP / days).toFixed(1);

            document.getElementById('h_perc').innerText = perc + "%";
            document.getElementById('h_days').innerText = days;
            document.getElementById('h_avg').innerText = avg;
            document.getElementById('daysCount').innerText = days;
            document.getElementById('statsHeader').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('fixBar').classList.remove('hidden');
        }

        window.changeDays = () => {
            const d = prompt("Enter the exact number of working days:");
            if(d && !isNaN(d)) updateStats(window.rawScan, parseInt(d));
        };

        function render(data) {
            document.getElementById('tableBody').innerHTML = data.map(r => `
                <tr class="active:bg-orange-50">
                    <td class="px-6 py-4 font-bold text-slate-700 uppercase truncate max-w-[160px]">${r.n}</td>
                    <td class="px-4 py-4 text-center text-green-600 font-black">${r.p}</td>
                    <td class="px-4 py-4 text-center text-red-400 font-black">${r.a}</td>
                </tr>`).join('');
            document.getElementById('results').classList.remove('hidden');
        }

        async function toBase64(f) {
            return new Promise(r => {
                const reader = new FileReader();
                reader.onloadend = () => r({ inlineData: { data: reader.result.split(',')[1], mimeType: f.type } });
                reader.readAsDataURL(f);
            });
        }

        function toggleUI(load) {
            document.getElementById('mainBtn').disabled = load;
            document.getElementById('loading').classList.toggle('hidden', !load);
            if(load) document.getElementById('results').classList.add('hidden');
        }

        window.download = () => {
            const csv = "Name,Present,Absent\n" + window.rawScan.map(r => `"${r.n}",${r.p},${r.a}`).join("\n");
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            a.download = "BOMIS_Attendance.csv";
            a.click();
        };
    </script>
</body>
</html>
