<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BOMIS Attendance</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#f97316">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; padding-top: env(safe-area-inset-top); }
        .school-gradient { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .icon-fill { object-fit: cover; transform: scale(1.1); }
    </style>
</head>
<body class="bg-orange-50 min-h-screen text-slate-900 flex flex-col">

    <header class="school-gradient text-white px-5 pt-6 pb-12 rounded-b-[2.5rem] shadow-lg sticky top-0 z-20">
        <div class="max-w-md mx-auto">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="bg-white w-14 h-14 rounded-full shadow-md overflow-hidden flex items-center justify-center border-none">
                        <img src="icon.png" alt="BOMIS" class="icon-fill w-full h-full" onerror="this.src='https://img.icons8.com/fluency/96/checked-user-male.png'">
                    </div>
                    <div>
                        <h1 class="text-lg font-black tracking-tight leading-none uppercase">BOMIS PURNEA</h1>
                        <p class="text-[9px] font-bold text-orange-100 tracking-widest uppercase opacity-90">Attendance Report Pro</p>
                    </div>
                </div>
                <button onclick="location.reload()" class="bg-black/20 p-2 rounded-xl text-[9px] font-black uppercase">Reset</button>
            </div>
            
            <div id="statsHeader" class="grid grid-cols-3 gap-2 opacity-0 transition-opacity duration-500">
                <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md border border-white/10 text-center">
                    <p class="text-[8px] uppercase font-bold text-orange-50 mb-1">Percentage</p>
                    <p id="h_perc" class="text-lg font-black">0%</p>
                </div>
                <div id="daysBox" class="bg-white/20 p-3 rounded-2xl backdrop-blur-md border border-white/10 text-center">
                    <p class="text-[8px] uppercase font-bold text-orange-50 mb-1">Total Days</p>
                    <p id="h_days" class="text-lg font-black">0</p>
                </div>
                <div class="bg-white/20 p-3 rounded-2xl backdrop-blur-md border border-white/10 text-center">
                    <p class="text-[8px] uppercase font-bold text-orange-50 mb-1">Avg/Day</p>
                    <p id="h_avg" class="text-lg font-black">0</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-md w-full mx-auto px-4 -mt-6 relative z-10 space-y-4 mb-28">
        <div class="bg-white rounded-3xl p-5 shadow-xl border border-orange-100">
            <div id="dropZone" class="relative border-2 border-dashed border-orange-200 rounded-2xl p-6 text-center bg-orange-50/30 min-h-[180px] flex flex-col items-center justify-center">
                <input type="file" id="imageInput" accept="image/*" onchange="handleSelection(this)" class="absolute inset-0 w-full h-full opacity-0 z-30 cursor-pointer">
                <div id="promptContent" class="space-y-3 pointer-events-none">
                    <div class="w-14 h-14 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center mx-auto shadow-sm">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </div>
                    <p class="text-orange-700 font-bold">Snap or Upload Photo</p>
                </div>
                <div id="successContent" class="hidden flex flex-col items-center z-20 space-y-3">
                    <img id="previewImg" class="w-24 h-24 object-cover rounded-2xl border-4 border-white shadow-lg">
                    <p class="text-green-600 font-black text-[10px] uppercase">Ready to Scan</p>
                </div>
            </div>
            <button onclick="analyze()" id="mainBtn" class="w-full mt-4 bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 text-sm uppercase">Run Analysis</button>
        </div>

        <div id="loading" class="hidden py-8 text-center animate-pulse">
            <div class="inline-block w-8 h-8 border-4 border-orange-600 border-t-transparent rounded-full animate-spin mb-3"></div>
            <p class="text-orange-600 font-bold text-xs">AI IS READING...</p>
        </div>

        <div id="results" class="hidden bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-100">
            <div class="px-5 py-4 bg-orange-50/50 flex justify-between items-center border-b border-orange-100">
                <span class="text-[10px] font-black uppercase text-orange-600">Results</span>
                <button onclick="download()" class="text-orange-700 text-[10px] font-black underline">Export CSV</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-orange-50 text-[10px] font-bold text-orange-400 uppercase">
                        <tr><th class="px-6 py-3">Student Name</th><th class="px-4 py-3 text-center">P</th><th class="px-4 py-3 text-center">A</th></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-orange-50 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="fixBar" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-xs bg-slate-900/95 backdrop-blur-xl text-white rounded-[2rem] p-3 shadow-2xl flex justify-between items-center z-50 safe-bottom">
        <div class="ml-4">
            <p class="text-[9px] font-bold text-slate-400 uppercase">Working Days</p>
            <p class="text-sm font-black"><span id="daysCount">0</span> Days</p>
        </div>
        <button onclick="changeDays()" class="bg-orange-600 px-6 py-3 rounded-full text-[10px] font-black uppercase">Edit Days</button>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";
        const API_KEY = "AIzaSyBWfttyqZz1wDPkptUtvphvHT0KawxH5I4";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.handleSelection = (input) => {
            const file = input.files[0];
            if(file) {
                document.getElementById('promptContent').classList.add('hidden');
                document.getElementById('successContent').classList.remove('hidden');
                const reader = new FileReader();
                reader.onload = (e) => { document.getElementById('previewImg').src = e.target.result; };
                reader.readAsDataURL(file);
            }
        };

        window.analyze = async () => {
            const input = document.getElementById('imageInput');
            if(!input.files[0]) return alert("Select photo first!");
            toggleUI(true);
            try {
                const model = genAI.getGenerativeModel({ model: "gemini-2.5-flash" }, { apiVersion: "v1" });
                const base64 = await toBase64(input.files[0]);
                const prompt = `Act as a Precision School Registrar for BOMIS Purnea. 
1. Identify the Student Name column.
2. For each row, count the '|' or 'P' marks as 1 Present. 
3. Count 'A' or 'Ab' as 1 Absent. 
4. IGNORE dates, roll numbers, and total columns already written in the photo. 
5. DO YOUR OWN COUNT from the raw marks. 
6. If you see a blank cell, assume it is an error and do not count it.
7. Total days MUST NOT exceed 31.
Return JSON ONLY: [{"n":"NAME","p":10,"a":2}]`;

                const result = await model.generateContent([prompt, base64]);
                const data = JSON.parse(result.response.text().replace(/```json|```/g, ""));
                window.rawScan = data;
                updateStats(data);
                render(data);
            } catch (e) { alert("AI Error: " + e.message); } finally { toggleUI(false); }
        };

        function updateStats(data, manualDays = null) {
            let totalP = 0, maxD = 0;
            data.forEach(s => { totalP += s.p; maxD = Math.max(maxD, (s.p + s.a)); });
            const days = manualDays || maxD;
            document.getElementById('h_perc').innerText = ((totalP / (data.length * days)) * 100).toFixed(1) + "%";
            document.getElementById('h_days').innerText = days;
            document.getElementById('h_avg').innerText = (totalP / days).toFixed(1);
            document.getElementById('daysCount').innerText = days;
            document.getElementById('statsHeader').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('fixBar').classList.remove('hidden');
        }

        window.changeDays = () => {
            const d = prompt("Working days:");
            if(d && !isNaN(d)) updateStats(window.rawScan, parseInt(d));
        };

        function render(data) {
            document.getElementById('tableBody').innerHTML = data.map(r => `<tr><td class="px-6 py-4 font-bold uppercase">${r.n}</td><td class="px-4 py-4 text-center text-green-600 font-black">${r.p}</td><td class="px-4 py-4 text-center text-red-400 font-black">${r.a}</td></tr>`).join('');
            document.getElementById('results').classList.remove('hidden');
        }

        async function toBase64(f) { return new Promise(r => { const reader = new FileReader(); reader.onloadend = () => r({ inlineData: { data: reader.result.split(',')[1], mimeType: f.type } }); reader.readAsDataURL(f); }); }
        function toggleUI(load) { document.getElementById('mainBtn').disabled = load; document.getElementById('loading').classList.toggle('hidden', !load); if(load) document.getElementById('results').classList.add('hidden'); }
        window.download = () => { const csv = "Name,P,A\n" + window.rawScan.map(r => `"${r.n}",${r.p},${r.a}`).join("\n"); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' })); a.download = "BOMIS.csv"; a.click(); };

        if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
    </script>
</body>
</html>
